<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平靜之源 v3.0 (終極沉浸版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Post-processing for bloom effect -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;500;700&family=Zen+Maru+Gothic:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background-color: #000000;
            color: #e2e8f0;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
        }

        .title {
            text-align: center;
            font-family: 'Noto Serif TC', serif;
            text-shadow: 0 0 30px rgba(251, 191, 36, 0.5);
            opacity: 0;
            animation: fadeInDown 2s ease-out 1s forwards;
            pointer-events: auto;
        }

        .instruction {
            text-align: center;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.15em;
            opacity: 0;
            animation: fadeInUp 2s ease-out 1.5s forwards;
            margin-bottom: 2rem;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* Message Modal - Glassmorphism Upgrade */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 50;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .message-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.95));
            color: #f1f5f9;
            padding: 4rem 3rem;
            border-radius: 24px;
            border: 1px solid rgba(251, 191, 36, 0.4);
            max-width: 90%;
            width: 500px;
            text-align: center;
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.5),
                0 0 100px rgba(251, 191, 36, 0.1),
                inset 0 0 20px rgba(255, 255, 255, 0.05);
            transform: scale(0.9) translateY(30px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .modal-overlay.active .message-card {
            transform: scale(1) translateY(0);
        }

        /* Golden shimmer line */
        .message-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(251, 191, 36, 0.05), transparent);
            transform: rotate(45deg);
            animation: shimmer 6s infinite linear;
            pointer-events: none;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .message-text {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.8rem;
            font-weight: 600;
            line-height: 1.6;
            color: #fbbf24; /* Amber 400 */
            margin-bottom: 2.5rem;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.3);
        }

        .message-category {
            font-size: 0.8rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            margin-bottom: 2rem;
            position: relative;
            display: inline-block;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(148, 163, 184, 0.3);
        }

        .close-btn {
            background: transparent;
            color: #e2e8f0;
            padding: 0.8rem 3rem;
            border-radius: 9999px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid rgba(251, 191, 36, 0.3);
            transition: all 0.4s ease;
            font-size: 0.9rem;
            letter-spacing: 0.15em;
            position: relative;
            z-index: 10;
            overflow: hidden;
        }

        .close-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(251, 191, 36, 0.1);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s ease;
            z-index: -1;
        }

        .close-btn:hover::before {
            transform: scaleX(1);
            transform-origin: left;
        }

        .close-btn:hover {
            border-color: #fbbf24;
            color: #fbbf24;
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.2);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-layer">
        <div class="title mt-12">
            <h1 class="text-4xl md:text-5xl font-light tracking-[0.3em] text-amber-50 drop-shadow-lg">平靜之源</h1>
            <p class="text-sm text-amber-200/60 mt-2 tracking-[0.5em] font-light">THE SOURCE OF PEACE</p>
        </div>
        <div class="instruction">
            <p>輕觸蓮花，接收宇宙的訊息</p>
        </div>
    </div>

    <!-- Message Modal -->
    <div class="modal-overlay" id="modal">
        <div class="message-card">
            <div class="message-category" id="msgCategory">CATEGORY</div>
            <div class="message-text" id="msgText">Loading...</div>
            <button class="close-btn" id="closeBtn">接收祝福</button>
        </div>
    </div>

    <script type="x-shader/x-vertex" id="vertexShader">
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    </script>

    <script type="x-shader/x-fragment" id="fragmentShader">
        uniform float time;
        varying vec2 vUv;
        
        // Simplex noise function
        vec3 permute(vec3 x) { return mod(((x*34.0)+1.0)*x, 289.0); }
        float snoise(vec2 v){
            const vec4 C = vec4(0.211324865405187, 0.366025403784439,
                    -0.577350269189626, 0.024390243902439);
            vec2 i  = floor(v + dot(v, C.yy) );
            vec2 x0 = v -   i + dot(i, C.xx);
            vec2 i1;
            i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
            vec4 x12 = x0.xyxy + C.xxzz;
            x12.xy -= i1;
            i = mod(i, 289.0);
            vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 ))
                + i.x + vec3(0.0, i1.x, 1.0 ));
            vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
            m = m*m ;
            m = m*m ;
            vec3 x = 2.0 * fract(p * C.www) - 1.0;
            vec3 h = abs(x) - 0.5;
            vec3 ox = floor(x + 0.5);
            vec3 a0 = x - ox;
            m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
            vec3 g;
            g.x  = a0.x  * x0.x  + h.x  * x0.y;
            g.yz = a0.yz * x12.xz + h.yz * x12.yw;
            return 130.0 * dot(m, g);
        }

        void main() {
            vec2 uv = vUv * 4.0; // Scale UV
            float noiseVal = snoise(vec2(uv.x + time * 0.1, uv.y + time * 0.1));
            
            // Deep water colors
            vec3 color1 = vec3(0.01, 0.05, 0.2); // Deep Blue
            vec3 color2 = vec3(0.05, 0.1, 0.3);  // Lighter Blue
            
            // Mix colors based on noise
            vec3 finalColor = mix(color1, color2, noiseVal * 0.5 + 0.5);
            
            // Add some "sparkle" highlights
            float sparkle = pow(max(0.0, snoise(uv * 4.0 + time * 0.2)), 8.0) * 0.5;
            finalColor += vec3(sparkle);

            gl_FragColor = vec4(finalColor, 0.8); // Slight transparency
        }
    </script>

    <script>
        // --- Three.js Scene Setup ---
        const scene = new THREE.Scene();
        // scene.fog = new THREE.FogExp2(0x020617, 0.005);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 40, 80);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        // Enable shadow map
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // --- Post-Processing (Bloom) ---
        const composer = new THREE.EffectComposer(renderer);
        const renderPass = new THREE.RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.5, // strength
            0.4, // radius
            0.85 // threshold
        );
        composer.addPass(bloomPass);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x4c1d95, 0.4);
        scene.add(ambientLight);

        const moonLight = new THREE.PointLight(0xfbbf24, 1.5, 150);
        moonLight.position.set(20, 40, -30);
        moonLight.castShadow = true;
        scene.add(moonLight);
        
        // Rim light for water
        const rimLight = new THREE.DirectionalLight(0x38bdf8, 0.5);
        rimLight.position.set(-10, 10, 10);
        scene.add(rimLight);

        // --- Advanced Water Shader ---
        const waterGeometry = new THREE.PlaneGeometry(300, 300, 128, 128);
        const waterUniforms = {
            time: { value: 0 }
        };
        const waterMaterial = new THREE.ShaderMaterial({
            uniforms: waterUniforms,
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent,
            transparent: true,
            side: THREE.DoubleSide
        });
        
        const water = new THREE.Mesh(waterGeometry, waterMaterial);
        water.rotation.x = -Math.PI / 2;
        water.receiveShadow = true;
        scene.add(water);

        // --- Lanterns (Lotuses) ---
        const lanterns = [];
        const lanternGeometry = new THREE.CylinderGeometry(0.1, 1.2, 1.5, 8, 1);
        const lanternMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xfcd34d, 
            emissive: 0xf59e0b, 
            emissiveIntensity: 0.5,
            roughness: 0.1,
            metalness: 0.1
        });
        
        // Petals for Lanterns
        const petalGeometry = new THREE.ConeGeometry(0.5, 2, 3);
        const petalMaterial = new THREE.MeshStandardMaterial({
            color: 0xfecaca, // Pinkish
            emissive: 0xe11d48,
            emissiveIntensity: 0.2,
            side: THREE.DoubleSide
        });

        function createLantern(x, z, delay) {
            const group = new THREE.Group();
            
            // Core
            const body = new THREE.Mesh(lanternGeometry, lanternMaterial);
            body.position.y = 0.75;
            body.castShadow = true;
            group.add(body);

            // Petals (Simple representation)
            for(let i=0; i<6; i++) {
                const petal = new THREE.Mesh(petalGeometry, petalMaterial);
                petal.position.y = 0.5;
                petal.rotation.x = Math.PI / 4;
                petal.rotation.y = (i / 6) * Math.PI * 2;
                petal.translateZ(0.8);
                group.add(petal);
            }

            // Point Light per lantern
            const light = new THREE.PointLight(0xfbbf24, 0.8, 10);
            light.position.set(0, 1.5, 0);
            group.add(light);

            group.position.set(x, 0, z);
            
            group.userData = {
                initialY: 0,
                floatSpeed: 0.3 + Math.random() * 0.4,
                floatOffset: Math.random() * Math.PI * 2,
                rotationSpeed: (Math.random() - 0.5) * 0.003
            };

            scene.add(group);
            lanterns.push(group);
            return group;
        }

        // Generate Lanterns
        for (let i = 0; i < 15; i++) {
            const x = (Math.random() - 0.5) * 80;
            const z = (Math.random() - 0.5) * 60 - 10; 
            createLantern(x, z, i);
        }

        // --- Particles (Fireflies/Stardust) ---
        const particlesGeometry = new THREE.BufferGeometry();
        const particleCount = 200;
        const posArray = new Float32Array(particleCount * 3);

        for(let i = 0; i < particleCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 150;
            if (i % 3 === 1) posArray[i] = Math.random() * 40 + 5; // Y position above water
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.4,
            color: 0xfef3c7,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending
        });
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const time = clock.getElapsedTime();
            waterUniforms.time.value = time * 0.3;

            // Animate Lanterns
            lanterns.forEach(lantern => {
                lantern.position.y = Math.sin(time * lantern.userData.floatSpeed + lantern.userData.floatOffset) * 0.5;
                lantern.rotation.y += lantern.userData.rotationSpeed;
            });

            // Animate Particles
            particlesMesh.rotation.y += 0.0003;
            const positions = particlesMesh.geometry.attributes.position.array;
            for(let i=1; i<particleCount*3; i+=3) {
                positions[i] += Math.sin(time + positions[i-1]) * 0.02; // Gentle float
            }
            particlesMesh.geometry.attributes.position.needsUpdate = true;

            // Render with Bloom
            composer.render();
        }
        animate();

        // --- Interaction Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        const quotes = [
            { text: "我無須追逐，豐盛如水自然流向我。", category: "🌊 針對身弱財旺" },
            { text: "我不需燃燒自己，滋養即是最大的生產力。", category: "💪 針對身弱財旺" },
            { text: "我有足夠的資源，應對當下的每一個挑戰。", category: "🛡️ 針對身弱財旺" },
            { text: "我是自己的太陽，在任何天氣下都能發光。", category: "☀️ 針對太陽化忌" },
            { text: "我接納所有陰影，它們是我光芒的背景。", category: "🌑 針對太陽化忌" },
            { text: "我的平靜，能照亮所有未知的恐懼。", category: "🕯️ 針對太陽化忌" },
            { text: "我允許自己感性，我的眼淚是珍珠。", category: "💧 針對雙重水瓶" },
            { text: "我在獨處中連結宇宙，我在人群中保持自在。", category: "🌌 針對雙重水瓶" },
            { text: "我不需完美，只需真實，這就是我的力量。", category: "✨ 針對雙重水瓶" },
            { text: "我無需證明價值，我的存在就是邀請。", category: "📜 針對投射者" },
            { text: "我珍視我的洞見，只分享給懂得珍惜的人。", category: "👀 針對投射者" },
            { text: "我停止推銷自己，我安住在我的光芒中。", category: "🗼 針對投射者" },
            { text: "享受當下，是我對生命最高的敬意。", category: "🎉 針對福德宮化祿" },
            { text: "快樂不是獎勵，而是我與生俱來的權利。", category: "🎁 針對福德宮化祿" },
            { text: "我允許自己放鬆，因為我值得被溫柔對待。", category: "🛋️ 針對福德宮化祿" }
        ];

        const modal = document.getElementById('modal');
        const msgText = document.getElementById('msgText');
        const msgCategory = document.getElementById('msgCategory');
        const closeBtn = document.getElementById('closeBtn');

        function openMessage() {
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            msgText.innerText = randomQuote.text;
            msgCategory.innerText = randomQuote.category;
            modal.classList.add('active');
        }

        closeBtn.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });

        // Handle Clicks
        window.addEventListener('mousedown', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // Map lantern groups to their mesh children for raycasting
            const lanternMeshes = [];
            lanterns.forEach(g => lanternMeshes.push(...g.children));

            const intersects = raycaster.intersectObjects(lanternMeshes);

            if (intersects.length > 0) {
                openMessage();
                
                // Simple visual feedback on click (scale up briefly)
                const clickedObj = intersects[0].object.parent;
                const originalScale = clickedObj.scale.x;
                clickedObj.scale.setScalar(originalScale * 1.2);
                setTimeout(() => {
                    clickedObj.scale.setScalar(originalScale);
                }, 200);
            }
        });

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
