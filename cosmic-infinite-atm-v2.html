<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宇宙無限 ATM v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #111827; /* Gray 900 */
            color: #fbbf24; /* Amber 400 */
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .mono-font {
            font-family: 'Space Mono', monospace;
        }

        /* Golden Glow Background */
        .glow-bg {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.15) 0%, rgba(17, 24, 39, 0) 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
            animation: pulse-glow 4s infinite alternate;
        }

        @keyframes pulse-glow {
            0% { opacity: 0.5; transform: translate(-50%, -50%) scale(0.9); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* The Card */
        .atm-card {
            width: 340px;
            height: 200px;
            background: linear-gradient(135deg, #1f2937 0%, #000000 100%);
            border-radius: 16px;
            border: 1px solid #4b5563;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(251, 191, 36, 0.2);
            position: relative;
            z-index: 10;
            transform-style: preserve-3d;
            transition: transform 0.6s ease, box-shadow 0.3s ease;
            cursor: pointer;
            margin-bottom: 2rem;
        }

        .atm-card:hover {
            transform: translateY(-5px) rotateX(5deg);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), 0 0 30px rgba(251, 191, 36, 0.4);
        }

        .chip {
            width: 50px;
            height: 35px;
            background: linear-gradient(135deg, #fcd34d 0%, #b45309 100%);
            border-radius: 6px;
            position: absolute;
            top: 40px;
            left: 30px;
            overflow: hidden;
        }
        
        .chip::before {
            content: '';
            position: absolute;
            top: 0; left: 50%; width: 1px; height: 100%; background: rgba(0,0,0,0.2);
        }
        .chip::after {
            content: '';
            position: absolute;
            top: 50%; left: 0; width: 100%; height: 1px; background: rgba(0,0,0,0.2);
        }

        /* The Screen */
        .atm-screen {
            width: 90%;
            max-width: 600px;
            min-height: 200px;
            background: rgba(31, 41, 55, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #374151;
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .message-text {
            font-size: 1.5rem;
            line-height: 1.6;
            font-weight: 700;
            color: #fcd34d; /* Amber 300 */
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            text-shadow: 0 0 10px rgba(252, 211, 77, 0.3);
        }

        .message-text.show {
            opacity: 1;
            transform: translateY(0);
        }

        .category-tag {
            font-size: 0.875rem;
            color: #9ca3af; /* Gray 400 */
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* The Button */
        .action-btn {
            margin-top: 2rem;
            background: linear-gradient(90deg, #d97706 0%, #f59e0b 100%);
            color: #111827;
            padding: 0.75rem 2rem;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
            z-index: 20;
            position: relative;
            overflow: hidden;
        }

        .action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.6);
            background: linear-gradient(90deg, #f59e0b 0%, #fbbf24 100%);
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        /* Particles (Coins/Sparkles) */
        .particle {
            position: absolute;
            color: #fcd34d;
            font-size: 1.2rem;
            pointer-events: none;
            opacity: 0;
            animation: float-up 1.5s ease-out forwards;
            z-index: 30;
        }

        @keyframes float-up {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.2); opacity: 0; }
        }

        /* Golden Ripple Shockwave */
        .shockwave {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.6) 0%, rgba(245, 158, 11, 0) 70%);
            transform: scale(0);
            animation: shockwave-anim 1.2s ease-out forwards;
            pointer-events: none;
            z-index: 15; /* Behind button, above background */
            mix-blend-mode: screen;
        }

        @keyframes shockwave-anim {
            0% { transform: scale(0); opacity: 0.8; }
            100% { transform: scale(4); opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="glow-bg"></div>

    <!-- The Infinite Card -->
    <div class="atm-card" id="card">
        <div class="chip"></div>
        <div class="absolute top-8 right-8 text-amber-500 font-bold tracking-widest">
            ∞ INFINITE
        </div>
        <div class="absolute bottom-16 left-8 mono-font text-gray-400 text-lg tracking-wider" style="word-spacing: 4px;">
            8888 8888 8888 8888
        </div>
        <div class="absolute bottom-6 left-8 flex justify-between w-3/4 text-gray-300 text-xs uppercase tracking-wide">
            <div>
                <span class="block text-[0.6rem] text-gray-500">VALID THRU</span>
                FOREVER
            </div>
            <div class="text-right">
                CTO
            </div>
        </div>
        <div class="absolute bottom-6 right-8 text-2xl">
            💳
        </div>
    </div>

    <!-- The Message Screen -->
    <div class="atm-screen">
        <div class="category-tag" id="category">準備就緒...</div>
        <div class="message-text" id="message">點擊下方按鈕提取豐盛能量</div>
    </div>

    <!-- Action Button -->
    <button class="action-btn" id="withdrawBtn">提取能量 (Withdraw)</button>

    <script>
        const affirmations = [
            { text: "金錢是安全的能量，\n我安心接收。", category: "🛡️ 安全感 (Security)" },
            { text: "我有足夠的資源，\n應對所有挑戰。", category: "🛡️ 安全感 (Security)" },
            { text: "我的安全感來自內在，\n不隨存款波動。", category: "🛡️ 安全感 (Security)" },
            { text: "我無需證明，\n我本身就值得豐盛。", category: "💎 價值感 (Worthiness)" },
            { text: "我對自己的愛，\n比金錢更珍貴。", category: "💎 價值感 (Worthiness)" },
            { text: "我允許財富流向我，\n因為我值得。", category: "💎 價值感 (Worthiness)" },
            { text: "花錢是滋養，賺錢是流動，\n我享受其中。", category: "🌊 流動與滋養 (Flow)" },
            { text: "金錢服務我的快樂，\n而非控制我的情緒。", category: "🌊 流動與滋養 (Flow)" },
            { text: "我釋放匱乏感，\n擁抱宇宙的無限供應。", category: "🌊 流動與滋養 (Flow)" },
            { text: "宇宙會照顧我，\n正如它照顧萬物。", category: "🤲 信任與交託 (Trust)" },
            { text: "我放下控制，\n信任金錢會在對的時間來到。", category: "🤲 信任與交託 (Trust)" },
            { text: "我的每一次呼吸，\n都是豐盛的證明。", category: "🤲 信任與交託 (Trust)" },
            { text: "我本身就是豐盛，\n金錢只是愛的顯化。", category: "✨ 豐盛終極心法" }
        ];

        const btn = document.getElementById('withdrawBtn');
        const messageEl = document.getElementById('message');
        const categoryEl = document.getElementById('category');
        const card = document.getElementById('card');

        function createParticles(x, y) {
            const symbols = ['✨', '💰', '💵','🌟','💖','💎','🎁'];
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                
                // Random spread
                const spreadX = (Math.random() - 0.5) * 300;
                const spreadY = (Math.random() - 1) * 200;

                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;
                
                // Custom animation for explosion effect
                particle.animate([
                    { transform: `translate(0, 0) scale(0.5)`, opacity: 1 },
                    { transform: `translate(${spreadX}px, ${spreadY}px) scale(1.5)`, opacity: 0 }
                ], {
                    duration: 1000 + Math.random() * 500,
                    easing: 'cubic-bezier(0, .9, .57, 1)',
                    fill: 'forwards'
                });
                
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 1500);
            }
        }

        function createShockwave(x, y) {
            const wave = document.createElement('div');
            wave.classList.add('shockwave');
            
            const size = Math.max(window.innerWidth, window.innerHeight) * 1.5;
            wave.style.width = `${size}px`;
            wave.style.height = `${size}px`;
            wave.style.left = `${x - size/2}px`;
            wave.style.top = `${y - size/2}px`;

            document.body.appendChild(wave);
            setTimeout(() => wave.remove(), 1200);
        }

        btn.addEventListener('click', (e) => {
            // 1. Trigger Shockwave
            const rect = btn.getBoundingClientRect();
            const btnX = rect.left + rect.width / 2;
            const btnY = rect.top + rect.height / 2;
            createShockwave(btnX, btnY);

            // 2. Animation Effect for Card
            messageEl.classList.remove('show');
            card.style.transform = "translateY(10px) rotateX(10deg)";
            
            setTimeout(() => {
                card.style.transform = "translateY(0) rotateX(0deg)";
                
                // 3. Random Selection
                const randomItem = affirmations[Math.floor(Math.random() * affirmations.length)];
                
                // 4. Update Content
                categoryEl.innerText = randomItem.category;
                messageEl.innerText = randomItem.text;
                messageEl.classList.add('show');

                // 5. Visual Feedback (Particles exploding from button)
                createParticles(btnX, btnY - 20);

            }, 200);
        });

        // Add card hover tilt effect
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 25;
            const y = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });

    </script>
</body>
</html>
