<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>界線防禦程式碼提取器 v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Space+Mono:wght@400;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #000510; /* Deepest Navy */
            color: #a5f3fc; /* Cyan 200 */
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .mono-font { font-family: 'Space Mono', monospace; }
        .tech-font { font-family: 'Orbitron', sans-serif; }

        /* Dynamic Grid Background */
        .grid-bg {
            position: absolute;
            top: 0; left: 0; width: 200%; height: 200%;
            background-image: 
                linear-gradient(rgba(6, 182, 212, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: grid-move 20s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes grid-move {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px); }
        }

        /* Vignette Overlay */
        .vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, #000510 100%);
            pointer-events: none;
            z-index: 1;
        }

        /* Holographic Console Window */
        .console-window {
            width: 90%;
            max-width: 700px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid #06b6d4; /* Cyan 500 */
            border-radius: 12px;
            box-shadow: 
                0 0 30px rgba(6, 182, 212, 0.2),
                inset 0 0 20px rgba(6, 182, 212, 0.1);
            position: relative;
            z-index: 10;
            overflow: hidden;
            transform: perspective(1000px) rotateX(2deg);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .console-window:hover {
            transform: perspective(1000px) rotateX(0deg) scale(1.01);
            box-shadow: 0 0 50px rgba(6, 182, 212, 0.4);
        }

        /* Scanline Effect */
        .console-window::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 2;
            opacity: 0.3;
        }
        
        /* Moving Scan Bar */
        .scan-bar {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 5px;
            background: rgba(6, 182, 212, 0.5);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.8);
            animation: scan 3s linear infinite;
            opacity: 0.3;
            pointer-events: none;
            z-index: 3;
        }

        @keyframes scan {
            0% { top: -5%; }
            100% { top: 105%; }
        }

        .console-header {
            background: rgba(8, 51, 68, 0.8);
            padding: 12px 20px;
            border-bottom: 1px solid #06b6d4;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .status-light {
            width: 8px; height: 8px; border-radius: 50%;
            background: #22c55e; /* Green */
            box-shadow: 0 0 10px #22c55e;
            animation: blink 2s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .console-content {
            padding: 30px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        /* Output Styling */
        .output-line {
            font-size: 1.1rem;
            margin-bottom: 12px;
            opacity: 0;
            animation: text-flicker 0.05s forwards;
        }
        
        @keyframes text-flicker {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .cmd-prefix { color: #22d3ee; font-weight: bold; margin-right: 10px; }
        .cmd-text { color: #bae6fd; }
        .sys-response { color: #facc15; font-weight: bold; text-shadow: 0 0 10px rgba(250, 204, 21, 0.4); }
        
        .affirmation-box {
            margin-top: 20px;
            padding: 20px;
            border: 1px dashed #06b6d4;
            background: rgba(6, 182, 212, 0.1);
            border-radius: 8px;
            text-align: center;
            display: none; /* Hidden initially */
        }
        
        .affirmation-text {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
            line-height: 1.5;
        }
        
        .affirmation-category {
            display: inline-block;
            margin-bottom: 10px;
            padding: 4px 12px;
            background: rgba(6, 182, 212, 0.2);
            color: #67e8f9;
            font-size: 0.8rem;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border: 1px solid rgba(6, 182, 212, 0.4);
        }

        /* Cyber Button */
        .deploy-btn {
            margin-top: 40px;
            background: transparent;
            color: #22d3ee;
            font-family: 'Orbitron', sans-serif;
            padding: 1rem 3rem;
            border: 2px solid #22d3ee;
            border-radius: 4px;
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 20;
            text-shadow: 0 0 8px rgba(34, 211, 238, 0.6);
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.2);
        }
        
        .deploy-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(34, 211, 238, 0.4), transparent);
            transition: left 0.5s ease;
        }
        
        .deploy-btn:hover::before {
            left: 100%;
        }

        .deploy-btn:hover {
            background: rgba(34, 211, 238, 0.1);
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.5);
            transform: scale(1.05);
        }
        
        .deploy-btn:active {
            transform: scale(0.98);
        }

        /* Header Title */
        .main-title {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            z-index: 10;
        }
        
        .main-title h1 {
            font-size: 3rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(6, 182, 212, 0.8);
            letter-spacing: 0.1em;
        }
        
        .main-title p {
            color: #67e8f9;
            font-size: 1.2rem;
            letter-spacing: 0.3em;
            margin-top: 5px;
            opacity: 0.8;
        }

        /* Particles */
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: #22d3ee;
            border-radius: 50%;
            pointer-events: none;
            z-index: 15;
            box-shadow: 0 0 10px #22d3ee;
        }

    </style>
</head>
<body>

    <div class="grid-bg"></div>
    <div class="vignette"></div>

    <div class="main-title">
        <h1>FIREWALL API</h1>
        <p>界線防禦控制台 v2.0</p>
    </div>

    <div class="console-window">
        <div class="scan-bar"></div>
        <div class="console-header mono-font">
            <div class="flex items-center gap-2">
                <div class="status-light"></div>
                <span class="text-xs text-cyan-300 tracking-widest">SYSTEM ONLINE // ROOT ACCESS</span>
            </div>
            <div class="text-xs text-slate-500">SECURE_CONNECTION</div>
        </div>
        
        <div class="console-content mono-font" id="consoleOutput">
            <div class="output-line">
                <span class="cmd-prefix">></span><span class="cmd-text">INITIALIZE_PROTOCOL...</span>
            </div>
            <div class="output-line">
                <span class="cmd-prefix">></span><span class="sys-response text-green-400">READY. WAITING FOR COMMAND.</span>
            </div>
        </div>
        
        <div class="p-6" id="resultArea">
            <!-- Dynamic Content Here -->
        </div>
    </div>

    <button class="deploy-btn" id="deployBtn">DEPLOY COMMAND</button>

    <script>
        const affirmations = [
            { text: "我的界線是我的主權。", category: "🛡️ 主權 (Sovereignty)" },
            { text: "尊重是常數，無需爭論。", category: "🛡️ 主權 (Sovereignty)" },
            { text: "我只聽從我的內在權威。", category: "🛡️ 主權 (Sovereignty)" },
            { text: "你的評判，不進入我的核心。", category: "🧱 隔離 (Isolation)" },
            { text: "我只接收愛，其餘全部丟棄。", category: "🧱 隔離 (Isolation)" },
            { text: "別人的情緒，是別人的修行。", category: "🧱 隔離 (Isolation)" },
            { text: "我拒絕被消耗，我選擇接收。", category: "🔋 能源 (Energy)" },
            { text: "我的平靜，不受你的情緒影響。", category: "🔋 能源 (Energy)" },
            { text: "我保持靜默，等待邀請。", category: "🔋 能源 (Energy)" }
        ];

        const deployBtn = document.getElementById('deployBtn');
        const consoleOutput = document.getElementById('consoleOutput');
        const resultArea = document.getElementById('resultArea');

        // Typewriter effect function
        function typeWriter(text, element, speed = 30, callback) {
            let i = 0;
            element.innerHTML = '';
            const interval = setInterval(() => {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    // Auto scroll to bottom
                    consoleOutput.scrollTop = consoleOutput.scrollHeight;
                } else {
                    clearInterval(interval);
                    if (callback) callback();
                }
            }, speed);
        }

        function createParticles(x, y) {
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                
                document.body.appendChild(particle);
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 100 + 50;
                
                const animation = particle.animate([
                    { transform: `translate(0, 0) scale(1)`, opacity: 1 },
                    { transform: `translate(${Math.cos(angle) * velocity}px, ${Math.sin(angle) * velocity}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 600,
                    easing: 'cubic-bezier(0, .9, .57, 1)',
                });
                
                animation.onfinish = () => particle.remove();
            }
        }

        deployBtn.addEventListener('click', (e) => {
            // 1. Particle Explosion
            const rect = deployBtn.getBoundingClientRect();
            createParticles(rect.left + rect.width/2, rect.top + rect.height/2);
            
            // 2. Disable button temporarily
            deployBtn.disabled = true;
            deployBtn.style.opacity = '0.5';
            deployBtn.innerText = "EXECUTING...";

            // 3. Clear previous result
            resultArea.innerHTML = '';

            // 4. Select Random Affirmation
            const randomItem = affirmations[Math.floor(Math.random() * affirmations.length)];

            // 5. Console Sequence
            const line1 = document.createElement('div');
            line1.className = 'output-line';
            line1.innerHTML = `<span class="cmd-prefix">></span><span class="cmd-text">DEPLOY_FIREWALL_RULE -target="${randomItem.category}"</span>`;
            consoleOutput.appendChild(line1);

            setTimeout(() => {
                const line2 = document.createElement('div');
                line2.className = 'output-line';
                line2.innerHTML = `<span class="cmd-prefix">></span><span class="sys-response" style="color:#facc15;">PROCESSING...</span>`;
                consoleOutput.appendChild(line2);
                
                // Scroll
                consoleOutput.scrollTop = consoleOutput.scrollHeight;

                setTimeout(() => {
                    line2.innerHTML = `<span class="cmd-prefix">></span><span class="sys-response text-green-400">SUCCESS. RULE ACTIVE.</span>`;
                    
                    // 6. Show Result Box
                    const resultBox = document.createElement('div');
                    resultBox.className = 'affirmation-box block animation-fade-in'; // Added block manually
                    resultBox.style.display = 'block'; // Force show
                    resultBox.style.animation = 'fadeInUp 0.5s ease forwards';
                    
                    resultBox.innerHTML = `
                        <span class="affirmation-category">${randomItem.category}</span>
                        <p class="affirmation-text">${randomItem.text}</p>
                    `;
                    resultArea.appendChild(resultBox);

                    // Re-enable button
                    deployBtn.disabled = false;
                    deployBtn.style.opacity = '1';
                    deployBtn.innerText = "DEPLOY COMMAND";
                    
                    // Scroll again to show result if needed
                    consoleOutput.scrollTop = consoleOutput.scrollHeight;

                }, 800);
            }, 400);
        });

        // Add keyframe for result box animation
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);

    </script>
</body>
</html>
